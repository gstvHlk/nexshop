<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexShop - Login</title>

  <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
  <script src="db.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-container">

    <h1>NexShop</h1>
    <p>Faça login para continuar</p>

    <div id="msg-erro" class="erro escondido"></div>

    <div class="formulario">

      <label>E-mail</label>
      <input type="email" id="input-email" placeholder="Digite seu e-mail">

      <label>Senha</label>
      <input type="password" id="input-senha" placeholder="Digite sua senha">

      <button onclick="fazerLogin()">Entrar</button>

    </div>

  </div>

  <script>
    if (Auth.getSessao()) {
      window.location.href = 'index.html';
    }

    async function fazerLogin() {
      const email = document.getElementById('input-email').value;
      const senha = document.getElementById('input-senha').value;

      if (!email || !senha) {
        mostrarErro('Preencha todos os campos!');
        return;
      }

      const resultado = await Auth.login(email, senha);

      if (!resultado.ok) {
        mostrarErro(resultado.msg);
        return;
      }

      if (resultado.usuario.tipo === 'admin') {
        window.location.href = 'admin-produtos.html';
      } else {
        window.location.href = 'index.html';
      }
    }

    function mostrarErro(msg) {
      const el = document.getElementById('msg-erro');
      el.textContent = msg;
      el.classList.remove('escondido');
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') fazerLogin();
    });
  </script>

</body>
</html>
