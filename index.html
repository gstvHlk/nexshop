<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexShop - Início</title>

  <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
  <script src="db.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- CABEÇALHO -->
  <header>
    <div class="header-container">
      <h1 class="logo">NexShop</h1>

      <!-- MENU DE CATEGORIAS -->
      <nav class="menu-categorias">
        <button onclick="filtrarCategoria('Todos')" class="cat-btn ativo">Todos</button>
        <button onclick="filtrarCategoria('Eletronicos')" class="cat-btn">Eletrônicos</button>
        <button onclick="filtrarCategoria('Moveis')" class="cat-btn">Móveis</button>
        <button onclick="filtrarCategoria('Calcados')" class="cat-btn">Calçados</button>
        <button onclick="filtrarCategoria('Acessorios')" class="cat-btn">Acessórios</button>
      </nav>

      <div class="header-acoes">
        <span id="nome-usuario"></span>
        <a href="login.html" id="btn-login">Entrar</a>
        <button id="btn-carrinho" onclick="abrirCarrinho()">
          🛒 <span id="qtd-carrinho">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- CARROSSEL -->
  <section class="carrossel">
    <div class="carrossel-track" id="carrossel-track">
      <!-- preenchido pelo JS -->
    </div>
    <button class="carrossel-btn esquerda" onclick="moverCarrossel(-1)">‹</button>
    <button class="carrossel-btn direita" onclick="moverCarrossel(1)">›</button>
  </section>

  <!-- PRODUTOS -->
  <main class="conteudo">
    <h2 id="titulo-secao">Todos os Produtos</h2>

    <div class="grid-produtos" id="grid-produtos">
      <!-- preenchido pelo JS -->
    </div>
  </main>

  <!-- CARRINHO -->
  <div class="carrinho-overlay escondido" id="carrinho-overlay" onclick="fecharCarrinho()"></div>
  <div class="carrinho-painel escondido" id="carrinho-painel">
    <div class="carrinho-header">
      <h3>Meu Carrinho</h3>
      <button onclick="fecharCarrinho()">✕</button>
    </div>
    <div id="carrinho-itens"></div>
  </div>
<script>
  // Verificar login
  const sessao = Auth.getSessao();
  if (sessao) {
    document.getElementById('nome-usuario').textContent = sessao.nome;
    document.getElementById('btn-login').textContent = 'Sair';
    document.getElementById('btn-login').onclick = function() {
      Auth.logout();
      location.reload();
    };
  }

  // Carrinho
  let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');

  function salvarCarrinho() {
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    document.getElementById('qtd-carrinho').textContent = carrinho.reduce((s, i) => s + i.qtd, 0);
  }

  function adicionarCarrinho(produto) {
    const item = carrinho.find(i => i._id === produto._id);
    if (item) {
      item.qtd += 1;
    } else {
      carrinho.push({ ...produto, qtd: 1 });
    }
    salvarCarrinho();
    alert(produto.nome + ' adicionado ao carrinho!');
  }

  function abrirCarrinho() {
    renderizarCarrinho();
    document.getElementById('carrinho-painel').classList.remove('escondido');
    document.getElementById('carrinho-overlay').classList.remove('escondido');
  }

  function fecharCarrinho() {
    document.getElementById('carrinho-painel').classList.add('escondido');
    document.getElementById('carrinho-overlay').classList.add('escondido');
  }

  function renderizarCarrinho() {
    const container = document.getElementById('carrinho-itens');
    if (carrinho.length === 0) {
      container.innerHTML = '<p style="color:gray;text-align:center;margin-top:20px">Carrinho vazio</p>';
      return;
    }
    const total = carrinho.reduce((s, i) => s + i.preco * i.qtd, 0);
    container.innerHTML = carrinho.map(i => `
      <div class="carrinho-item">
        <span class="emoji">${i.imagem}</span>
        <div class="carrinho-item-info">
          <p>${i.nome}</p>
          <span>R$ ${i.preco.toFixed(2)} x ${i.qtd}</span>
        </div>
        <button onclick="removerCarrinho('${i._id}')">✕</button>
      </div>
    `).join('') + `
      <div class="carrinho-total">Total: R$ ${total.toFixed(2)}</div>
      <button class="btn-finalizar" onclick="finalizar()">Finalizar Pedido</button>
    `;
  }

  function removerCarrinho(id) {
    carrinho = carrinho.filter(i => i._id !== id);
    salvarCarrinho();
    renderizarCarrinho();
  }

  function finalizar() {
    if (!Auth.getSessao()) {
      alert('Faça login para finalizar o pedido!');
      location.href = 'login.html';
      return;
    }
    carrinho = [];
    salvarCarrinho();
    fecharCarrinho();
    alert('Pedido finalizado com sucesso!');
  }

  // Carrossel
  let carrosselIdx = 0;
  let destaques = [];

  function renderizarCarrossel() {
    const track = document.getElementById('carrossel-track');
    track.innerHTML = destaques.map(p => `
      <div class="carrossel-slide">
        <div class="emoji">${p.imagem}</div>
        <h2>${p.nome}</h2>
        <p>${p.descricao}</p>
        <span class="preco">R$ ${p.preco.toFixed(2)}</span>
      </div>
    `).join('');
  }

  function moverCarrossel(dir) {
    carrosselIdx = (carrosselIdx + dir + destaques.length) % destaques.length;
    document.getElementById('carrossel-track').style.transform = `translateX(-${carrosselIdx * 100}%)`;
  }

  // Categorias
  let categoriaAtiva = 'Todos';

  function filtrarCategoria(cat) {
    categoriaAtiva = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('ativo'));
    event.target.classList.add('ativo');
    document.getElementById('titulo-secao').textContent = cat === 'Todos' ? 'Todos os Produtos' : cat;
    renderizarProdutos();
  }

  // Produtos
  let todosProdutos = [];

  function renderizarProdutos() {
    let lista = todosProdutos;
    if (categoriaAtiva !== 'Todos') {
      lista = lista.filter(p => p.categoria === categoriaAtiva);
    }
    const grid = document.getElementById('grid-produtos');
    if (lista.length === 0) {
      grid.innerHTML = '<p style="color:gray">Nenhum produto encontrado.</p>';
      return;
    }
    grid.innerHTML = lista.map(p => `
      <div class="card-produto" onclick="location.href='produto.html?id=${p._id}'">
        <div class="emoji">${p.imagem}</div>
        <h3>${p.nome}</h3>
        <p class="categoria">${p.categoria}</p>
        <p class="preco">R$ ${p.preco.toFixed(2)}</p>
        <button onclick="event.stopPropagation(); adicionarCarrinho(${JSON.stringify(p).replace(/"/g, '&quot;')})">
          Adicionar ao carrinho
        </button>
      </div>
    `).join('');
  }

  // Inicializar
  async function init() {
    todosProdutos = await Produtos.listar();
    todosProdutos = todosProdutos.sort(() => Math.random() - 0.5);
    destaques = todosProdutos.filter(p => p.destaque);
    renderizarCarrossel();
    renderizarProdutos();
    salvarCarrinho();
    setInterval(() => moverCarrossel(1), 3000);
  }

  init();
</script>

</body>
</html>
